<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>body{width:280px;background:#04050A;color:#fff;font-family:system-ui;padding:20px;}h2{color:#FFB800;margin-bottom:16px;font-size:18px;}input{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:4px;padding:8px 12px;color:#fff;font-size:12px;margin-bottom:12px;outline:none;}button{width:100%;background:#FFB800;color:#000;border:none;padding:10px;border-radius:4px;font-weight:700;cursor:pointer;}#s{font-size:11px;color:#00ff88;margin-top:8px;text-align:center;}</style></head>
<body><h2>✦ Promptless</h2><input type="password" id="k" placeholder="sk-ant-api..."><button onclick="save()">Save API Key</button><div id="s"></div>
<script>chrome.storage.sync.get(['apiKey'],r=>{if(r.apiKey)document.getElementById('k').value=r.apiKey;});function save(){const k=document.getElementById('k').value.trim();if(!k)return;chrome.storage.sync.set({apiKey:k},()=>{document.getElementById('s').textContent='✓ Saved!';});}</script></body></html>
